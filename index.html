<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="site-title">Game Hub</h1>

    <div class="tab-name-box">
      <input id="tabNameInput" type="text" placeholder="Choose tab name..." />
      <button id="saveTabNameBtn">Save</button>
      <button id="resetTabNameBtn">Reset</button>
    </div>
  </header>

  <main class="main-content">
    <section id="gameGrid" class="game-grid"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
